<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="title desc">
  <title id="title">Slither legal and illegal diagonal shapes</title>
  <desc id="desc">Diagonal same-color stones are illegal unless they share an orthogonally adjacent common stone.</desc>
  <style>
    .board { fill: #f7f2df; stroke: #2b2f36; stroke-width: 3; }
    .grid { stroke: #8a8170; stroke-width: 1.5; }
    .black { fill: #20242a; stroke: #2b2f36; stroke-width: 3; }
    .mark-bad { stroke: #dc2626; stroke-width: 9; stroke-linecap: round; }
    .mark-ok { fill: none; stroke: #16a34a; stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
    .label { font: 18px sans-serif; fill: #20242a; }
    .small { font: 15px sans-serif; fill: #475569; }
  </style>
  <g transform="translate(40,35)">
    <rect class="board" x="0" y="0" width="260" height="220" rx="6"/>
    <g>
      <line class="grid" x1="40" y1="40" x2="220" y2="40"/>
      <line class="grid" x1="40" y1="100" x2="220" y2="100"/>
      <line class="grid" x1="40" y1="160" x2="220" y2="160"/>
      <line class="grid" x1="40" y1="40" x2="40" y2="160"/>
      <line class="grid" x1="100" y1="40" x2="100" y2="160"/>
      <line class="grid" x1="160" y1="40" x2="160" y2="160"/>
      <line class="grid" x1="220" y1="40" x2="220" y2="160"/>
    </g>
    <circle class="black" cx="100" cy="100" r="18"/>
    <circle class="black" cx="160" cy="160" r="18"/>
    <line class="mark-bad" x1="80" y1="75" x2="180" y2="185"/>
    <line class="mark-bad" x1="180" y1="75" x2="80" y2="185"/>
    <text class="label" x="70" y="255">Illegal</text>
    <text class="small" x="5" y="282">Diagonal stones have no common orthogonal stone.</text>
  </g>
  <g transform="translate(410,35)">
    <rect class="board" x="0" y="0" width="260" height="220" rx="6"/>
    <g>
      <line class="grid" x1="40" y1="40" x2="220" y2="40"/>
      <line class="grid" x1="40" y1="100" x2="220" y2="100"/>
      <line class="grid" x1="40" y1="160" x2="220" y2="160"/>
      <line class="grid" x1="40" y1="40" x2="40" y2="160"/>
      <line class="grid" x1="100" y1="40" x2="100" y2="160"/>
      <line class="grid" x1="160" y1="40" x2="160" y2="160"/>
      <line class="grid" x1="220" y1="40" x2="220" y2="160"/>
    </g>
    <circle class="black" cx="100" cy="100" r="18"/>
    <circle class="black" cx="160" cy="160" r="18"/>
    <circle class="black" cx="160" cy="100" r="18"/>
    <path class="mark-ok" d="M84 96 L112 126 L162 92 L196 128"/>
    <text class="label" x="84" y="255">Legal</text>
    <text class="small" x="-18" y="282">The common stone touches both diagonal stones orthogonally.</text>
  </g>
</svg>
