<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-labelledby="title desc">
  <title id="title">Slither connection example</title>
  <desc id="desc">White stones form an orthogonal chain connecting the left and right edges.</desc>
  <style>
    .board { fill: #f7f2df; stroke: #2b2f36; stroke-width: 3; }
    .grid { stroke: #8a8170; stroke-width: 1.5; }
    .edge-w { stroke: #f4f7fb; stroke-width: 14; }
    .edge-b { stroke: #20242a; stroke-width: 14; }
    .white { fill: #f8fafc; stroke: #2b2f36; stroke-width: 3; }
    .black { fill: #20242a; stroke: #2b2f36; stroke-width: 3; }
    .chain { stroke: #2563eb; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; fill: none; opacity: .55; }
    .label { font: 18px sans-serif; fill: #20242a; }
  </style>
  <rect class="board" x="80" y="40" width="360" height="260" rx="6"/>
  <line class="edge-w" x1="80" y1="170" x2="80" y2="170"/>
  <line class="edge-w" x1="440" y1="170" x2="440" y2="170"/>
  <line class="edge-b" x1="260" y1="40" x2="260" y2="40"/>
  <line class="edge-b" x1="260" y1="300" x2="260" y2="300"/>
  <g>
    <line class="grid" x1="130" y1="80" x2="390" y2="80"/>
    <line class="grid" x1="130" y1="125" x2="390" y2="125"/>
    <line class="grid" x1="130" y1="170" x2="390" y2="170"/>
    <line class="grid" x1="130" y1="215" x2="390" y2="215"/>
    <line class="grid" x1="130" y1="260" x2="390" y2="260"/>
    <line class="grid" x1="130" y1="80" x2="130" y2="260"/>
    <line class="grid" x1="195" y1="80" x2="195" y2="260"/>
    <line class="grid" x1="260" y1="80" x2="260" y2="260"/>
    <line class="grid" x1="325" y1="80" x2="325" y2="260"/>
    <line class="grid" x1="390" y1="80" x2="390" y2="260"/>
  </g>
  <path class="chain" d="M130 170 L195 170 L195 125 L260 125 L325 125 L325 170 L390 170"/>
  <circle class="white" cx="130" cy="170" r="17"/>
  <circle class="white" cx="195" cy="170" r="17"/>
  <circle class="white" cx="195" cy="125" r="17"/>
  <circle class="white" cx="260" cy="125" r="17"/>
  <circle class="white" cx="325" cy="125" r="17"/>
  <circle class="white" cx="325" cy="170" r="17"/>
  <circle class="white" cx="390" cy="170" r="17"/>
  <circle class="black" cx="260" cy="80" r="17"/>
  <circle class="black" cx="260" cy="215" r="17"/>
  <circle class="black" cx="325" cy="260" r="17"/>
  <text class="label" x="110" y="335">White connects the left and right edges.</text>
</svg>
